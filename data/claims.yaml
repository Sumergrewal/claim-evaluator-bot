# Sample claims, curated so every engine path appears at least once.
#
# Coverage matrix (see "Sample data" entry in docs/decisions.md):
#   C-CAROL-001   pure covered, paid lifecycle
#   C-CAROL-002   mixed approved/denied -> partially_approved
#   C-CAROL-003   missing preauth -> needs_review
#   C-CAROL-004   intra-claim annual-cap accumulator + over-limit
#   C-ALICE-001   deductible absorbs entire charge
#   C-ALICE-002   deductible filled mid-claim, then cost-sharing
#   C-ALICE-003   baseline physio with coinsurance after deductible met
#   C-ALICE-004   cross-claim accumulator + over-limit
#   C-ALICE-005   preauthed MRI with coinsurance
#   C-ALICE-006   hard exclusion -> denied (contrast with C-BOB-002)
#   C-BOB-001     deductible + copay, paid lifecycle
#   C-BOB-002     same service as C-ALICE-006, covered under PREMIUM
#   C-BOB-003     missing preauth -> needs_review
#
# Listed in chronological submitted_at order so the engine's
# accumulator evolves the way the scenarios assume. Line items
# default to status `pending` and `preauth_ref` to null -- the seed
# loader fills both. Money is quoted strings; Decimal round-trip is
# exact.
#
# Two claims (C-BOB-001 and C-CAROL-001) carry `paid_at` to make the
# `paid` claim lifecycle visible on first launch. Their line items
# stay `pending` at seed-load time and are filled in by the engine on
# the same startup (phase 06). Do not hand-author AdjudicationDecision
# rows in this file; engine output is not seed data.

