# Sample policies and their coverage rules.
#
# Three plans of increasing generosity:
#   - P-BASIC-2026    $500 deductible, mid-tier coverage, bariatric excluded
#   - P-PREMIUM-2026  $250 deductible, low cost-share, bariatric covered
#   - P-DENTAL-2026   $0 deductible, dental-only coverage
#
# Coverage rules nest under each policy. Money is stored as quoted
# strings so Decimal round-trip stays exact (see the seed-data
# decision in docs/decisions.md). Rule kinds and their parameter
# shapes are documented in docs/domain-model.md.

- id: P-BASIC-2026
  member_id: M-001
  name: "Basic Health 2026"
  effective_date: 2026-01-01
  termination_date: 2026-12-31
  annual_deductible: "500.00"
  rules:
    # general_consultation: covered, $25 copay
    - id: R-BASIC-001
      service_type: general_consultation
      kind: service_covered
      parameters: {}
    - id: R-BASIC-002
      service_type: general_consultation
      kind: copay
      parameters:
        amount: "25.00"

    # physiotherapy: covered, $1000/year cap, 20% coinsurance
    - id: R-BASIC-003
      service_type: physiotherapy
      kind: service_covered
      parameters: {}
    - id: R-BASIC-004
      service_type: physiotherapy
      kind: annual_limit
      parameters:
        cap_amount: "1000.00"
        period: "calendar_year"
    - id: R-BASIC-005
      service_type: physiotherapy
      kind: coinsurance
      parameters:
        member_pct: 20

    # mri: covered, preauth required, 20% coinsurance
    - id: R-BASIC-006
      service_type: mri
      kind: service_covered
      parameters: {}
    - id: R-BASIC-007
      service_type: mri
      kind: preauth_required
      parameters: {}
    - id: R-BASIC-008
      service_type: mri
      kind: coinsurance
      parameters:
        member_pct: 20

    # bariatric_surgery: excluded
    - id: R-BASIC-009
      service_type: bariatric_surgery
      kind: service_excluded
      parameters: {}

    # wellness_visit: covered, no cost-sharing (preventive)
    - id: R-BASIC-010
      service_type: wellness_visit
      kind: service_covered
      parameters: {}

